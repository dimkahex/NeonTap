name: neon_pulse_online
description: Ultra-minimalist neon timing game with online hooks (Phase 1: offline core).
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0

  # Online foundation (Phase 1: guest auth only).
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  firebase_database: ^11.0.1

  # Future hooks (stubs/placeholder usage in Phase 1).
  rive: ^0.13.20
  google_mobile_ads: ^5.1.0
  purchases_flutter: ^6.22.0
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sfx/
