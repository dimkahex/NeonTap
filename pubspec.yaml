name: neon_pulse_online
description: "Ultra-minimalist neon timing game with online hooks (Phase 1: offline core)."
publish_to: "none"

# name+b: bump +1 for each release build (visible in APK filenames from CI).
version: 0.2.0+5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0

  # Online foundation (Phase 1: guest auth only).
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  firebase_database: ^11.0.1

  # Future hooks: add when wired (avoid CI/native config until then).
  # rive / google_mobile_ads / purchases_flutter / flutter_local_notifications

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sfx/
