name: Android APK (Release)

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

# GitHub Actions: reduce Node 20 deprecation noise for JS-based actions (checkout/setup-java).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build context (commit SHA)
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          git log -1 --oneline
          echo ""
          echo "NOTE: 'Re-run' repeats the SAME commit. If you see an old SHA (e.g. 7118e76), open the latest run after push or use workflow_dispatch on master."

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # Firebase Android requires google-services.json at android/app/ (CI placeholder until you add a real file from Firebase Console).
      - name: Ensure Android platform + Firebase config
        run: |
          set -e
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.neonpulse --project-name neon_pulse_online .
          fi
          mkdir -p android/app
          cp ci/android-placeholders/google-services.json android/app/google-services.json
          python3 ci/patch_android_firebase_gradle.py

      - name: Debug Gradle snippets (after patch)
        run: |
          set -e
          echo "--- android/settings.gradle (first 120 lines) ---"
          sed -n '1,120p' android/settings.gradle || true
          echo "--- android/app/build.gradle (first 80 lines) ---"
          sed -n '1,80p' android/app/build.gradle || true

      - name: Build APK (release)
        run: |
          set -euo pipefail
          flutter build apk --release

      - name: Gradle stacktrace (only if Flutter build failed)
        if: failure()
        working-directory: android
        run: |
          set -euo pipefail
          chmod +x gradlew || true
          ./gradlew :app:assembleRelease --stacktrace --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neon_pulse_online-apk
          path: build/app/outputs/flutter-apk/app-release.apk

