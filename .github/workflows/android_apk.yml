name: Android APK (Release)

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # Firebase Android requires google-services.json at android/app/ (CI placeholder until you add a real file from Firebase Console).
      - name: Ensure Android platform + Firebase config
        run: |
          set -e
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.neonpulse --project-name neon_pulse_online .
          fi
          mkdir -p android/app
          cp ci/android-placeholders/google-services.json android/app/google-services.json
          python3 ci/patch_android_firebase_gradle.py

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neon_pulse_online-apk
          path: build/app/outputs/flutter-apk/app-release.apk

